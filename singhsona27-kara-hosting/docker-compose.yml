services:
  app_proxy:
    environment:
      APP_HOST: hosting-platform-portal
      APP_PORT: 80
      PROXY_AUTH_ADD: "false"

  traefik:
    image: traefik:v3.3
    container_name: hosting-platform-traefik
    restart: unless-stopped
    command:
      - --api.dashboard=true
      - --api.insecure=true
      - --entrypoints.web.address=:80
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.docker.network=hosting_net
      - --log.level=INFO
      - --accesslog=true
    ports:
      - "8088:80"
      - "8089:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - hosting_net

  hosting-platform-db:
    image: mariadb:11
    container_name: hosting-platform-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: StrongRootPassword123
      MYSQL_DATABASE: hosting_platform
      MYSQL_USER: platform_user
      MYSQL_PASSWORD: StrongPlatformPassword123
    volumes:
      - hosting_platform_db:/var/lib/mysql
    networks:
      - hosting_net

  hosting-platform-portal:
    build:
      context: ${APP_DATA_DIR}/hosting_phase1
      dockerfile: Dockerfile
    container_name: hosting-platform-portal
    user: root
    group_add:
      - "987"
    restart: unless-stopped
    ports:
      - "8200:80"
    environment:
      WEB_DOCUMENT_ROOT: /app
      WEB_DOCUMENT_INDEX: index.php
      PHP_UPLOAD_MAX_FILESIZE: 512M
      PHP_POST_MAX_SIZE: 512M
      PHP_MEMORY_LIMIT: 512M
      PLATFORM_ROOT: ${APP_DATA_DIR}/hosting_phase1
      APP_KEY: ${APP_KEY:-change-this-long-random-secret-before-production}
      BASE_DOMAIN: ${BASE_DOMAIN:-umbrel2.karacraft.ng}
      URL_SCHEME: ${URL_SCHEME:-https}
      PORTAL_DOMAIN: ${PORTAL_DOMAIN:-hosting.umbrel2.karacraft.ng}
      DB_DOMAIN: ${DB_DOMAIN:-db.umbrel2.karacraft.ng}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-tls}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-Karacraft Hosting}
      CLOUDFLARE_ACCOUNT_ID: ${CLOUDFLARE_ACCOUNT_ID:-}
      CLOUDFLARE_TUNNEL_ID: ${CLOUDFLARE_TUNNEL_ID:-}
      CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN:-}
      CLOUDFLARE_TUNNEL_SERVICE: ${CLOUDFLARE_TUNNEL_SERVICE:-http://umbrel.local:8088}
    labels:
      - traefik.enable=true
      - traefik.docker.network=hosting_net
      - traefik.http.routers.karacraft_portal.rule=Host(`${PORTAL_DOMAIN:-hosting.umbrel2.karacraft.ng}`)
      - traefik.http.routers.karacraft_portal.entrypoints=web
      - traefik.http.services.karacraft_portal.loadbalancer.server.port=80
    volumes:
      - ${APP_DATA_DIR}/hosting_phase1/portal:/app
      - ${APP_DATA_DIR}/hosting_phase1/provisioner:/provisioner
      - ${APP_DATA_DIR}/hosting_phase1/customer_data:/customer_data
      - ${APP_DATA_DIR}/hosting_phase1/backups:/backups
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - hosting-platform-db
      - traefik
    networks:
      - hosting_net

  hosting-platform-phpmyadmin:
    image: phpmyadmin:latest
    container_name: hosting-platform-phpmyadmin
    restart: unless-stopped
    ports:
      - "8201:80"
    environment:
      PMA_HOST: hosting-platform-db
      PMA_PORT: 3306
      UPLOAD_LIMIT: 1024M
      PMA_ABSOLUTE_URI: https://${DB_DOMAIN:-db.umbrel2.karacraft.ng}/
    labels:
      - traefik.enable=true
      - traefik.docker.network=hosting_net
      - traefik.http.routers.karacraft_phpmyadmin.rule=Host(`${DB_DOMAIN:-db.umbrel2.karacraft.ng}`)
      - traefik.http.routers.karacraft_phpmyadmin.entrypoints=web
      - traefik.http.services.karacraft_phpmyadmin.loadbalancer.server.port=80
    depends_on:
      - hosting-platform-db
      - traefik
    networks:
      - hosting_net

  hosting-permission-fixer:
    image: alpine:3.20
    container_name: hosting-platform-permission-fixer
    restart: unless-stopped
    command: >
      sh -c "while true; do
      chown -R 1000:1000 /customer_data 2>/dev/null || true;
      find /customer_data -type d -exec chmod 755 {} + 2>/dev/null || true;
      find /customer_data -type f -exec chmod 644 {} + 2>/dev/null || true;
      sleep 60;
      done"
    volumes:
      - ${APP_DATA_DIR}/hosting_phase1/customer_data:/customer_data
    networks:
      - hosting_net

networks:
  hosting_net:
    name: hosting_net
    driver: bridge

volumes:
  hosting_platform_db:
