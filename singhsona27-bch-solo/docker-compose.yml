services:
  app_proxy:
    image: getumbrel/app-proxy:1.7.0
    environment:
      APP_HOST: bch-dashboard
      APP_PORT: 8080
      PROXY_PORT: 3102
      PROXY_AUTH_ADD: "false"
      PROXY_AUTH_WHITELIST: ""
      PROXY_AUTH_BLACKLIST: ""
      LOG_LEVEL: info
      JWT_SECRET: c42c8a9ac2f2d1d67860467eb18dd40d71de9487ae35ae8a632e14fe59f30c6f
      MANAGER_IP: 10.21.21.4
      MANAGER_PORT: 3006
      UMBREL_AUTH_SECRET: DEADBEEF
      AUTH_SERVICE_PORT: 2000
    volumes:
      - ${APP_DATA_DIR}:/data
      - ${APP_DATA_DIR}/umbrel-app.yml:/extra/umbrel-app.yml:ro
    networks:
      - default
      - mining

  bch-node:
    image: zquestz/bitcoin-cash-node:latest
    restart: unless-stopped
    stop_grace_period: 2m
    environment:
      RPC_USER: ${RPC_USER:-umbrel}
      RPC_PASSWORD: ${RPC_PASSWORD:-changeme}
    entrypoint: ["/bin/sh", "-ec"]
    command:
      - |
        exec bitcoind \
          -datadir=/data \
          -printtoconsole \
          -server=1 \
          -listen=1 \
          -port=8333 \
          -rpcbind=0.0.0.0 \
          -rpcallowip=172.16.0.0/12 \
          -rpcallowip=192.168.0.0/16 \
          -rpcport=8332 \
          -rpcuser=${RPC_USER:-umbrel} \
          -rpcpassword=${RPC_PASSWORD:-changeme} \
          -dbcache=${BCHN_DBCACHE_MB:-6144} \
          -par=${BCHN_PAR:-3} \
          -rpcthreads=${BCHN_RPC_THREADS:-8} \
          -rpcworkqueue=${BCHN_RPC_WORKQUEUE:-128} \
          -maxconnections=${BCHN_MAX_CONNECTIONS:-96} \
          -maxmempool=${BCHN_MAX_MEMPOOL_MB:-1024} \
          -mempoolexpiry=72 \
          -txindex=0 \
          -blocksonly=0 \
          -zmqpubhashblock=tcp://0.0.0.0:28332 \
          -zmqpubrawblock=tcp://0.0.0.0:28333
    ports:
      - "${BCH_P2P_PORT:-8333}:8333/tcp"
    volumes:
      - ${APP_DATA_DIR}/data/bchn:/data
    networks:
      - mining
    healthcheck:
      test: ["CMD-SHELL", "bitcoin-cli -datadir=/data -rpcconnect=127.0.0.1 -rpcuser=\"$${RPC_USER}\" -rpcpassword=\"$${RPC_PASSWORD}\" getblockchaininfo >/dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 2m
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  bch-ckpool:
    image: ${CKPOOL_IMAGE:-ghcr.io/willitmod/wim-solo-ckpool:0.8.3-rc1-590fb2a}
    restart: unless-stopped
    depends_on:
      bch-node:
        condition: service_healthy
    environment:
      RPC_USER: ${RPC_USER:-umbrel}
      RPC_PASSWORD: ${RPC_PASSWORD:-changeme}
      POOL_SIGNATURE: ${POOL_SIGNATURE:-BCH Solo}
      STRATUM_INTERNAL_PORT: "3333"
    entrypoint: ["/bin/sh", "-ec"]
    command:
      - |
        mkdir -p /run/ckpool /logs
        sed \
          -e "s|@@RPC_USER@@|$${RPC_USER}|g" \
          -e "s|@@RPC_PASSWORD@@|$${RPC_PASSWORD}|g" \
          -e "s|@@POOL_SIGNATURE@@|$${POOL_SIGNATURE}|g" \
          -e "s|@@STRATUM_INTERNAL_PORT@@|$${STRATUM_INTERNAL_PORT}|g" \
          /config/ckpool.conf.template > /run/ckpool/ckpool.conf
        rm -f /tmp/ckpool/*.pid /run/ckpool/*.pid 2>/dev/null || true
        if command -v ckpool >/dev/null 2>&1; then
          exec ckpool -k -B -L -c /run/ckpool/ckpool.conf
        elif [ -x /bin/ckpool ]; then
          exec /bin/ckpool -k -B -L -c /run/ckpool/ckpool.conf
        else
          exec /usr/bin/ckpool -k -B -L -c /run/ckpool/ckpool.conf
        fi
    ports:
      - "${STRATUM_PORT:-3335}:3333/tcp"
    volumes:
      - ${APP_DATA_DIR}/pool:/config:ro
      - ${APP_DATA_DIR}/data/ckpool:/logs
    networks:
      - mining
    ulimits:
      nofile:
        soft: 1048576
        hard: 1048576
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  bch-dashboard:
    image: python:3.12-alpine
    restart: unless-stopped
    depends_on:
      bch-node:
        condition: service_healthy
    working_dir: /app
    command: ["python", "/app/dashboard/dashboard.py"]
    environment:
      RPC_URL: http://bch-node:8332/
      RPC_USER: ${RPC_USER:-umbrel}
      RPC_PASSWORD: ${RPC_PASSWORD:-changeme}
      STRATUM_PORT: ${STRATUM_PORT:-3335}
      DASHBOARD_TITLE: ${DASHBOARD_TITLE:-BCH Solo Node}
      EXPECTED_HASHRATE_TH: ${EXPECTED_HASHRATE_TH:-97}
      DASHBOARD_USER: ${DASHBOARD_USER:-admin}
      DASHBOARD_PASSWORD: ${DASHBOARD_PASSWORD:-admin}
    ports:
      - "${DASHBOARD_PORT:-8087}:8080/tcp"
    volumes:
      - ${APP_DATA_DIR}/:/app
      - ${APP_DATA_DIR}/data/ckpool:/logs:ro
    networks:
      - mining
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

networks:
  default:
  mining:
    name: bchsolo-net
    driver: bridge
