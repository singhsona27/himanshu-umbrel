services:
  app_proxy:
    image: getumbrel/app-proxy:1.7.0
    environment:
      APP_HOST: dgb-dashboard
      APP_PORT: 8080
      PROXY_PORT: 3101
      PROXY_AUTH_ADD: "false"
      PROXY_AUTH_WHITELIST: ""
      PROXY_AUTH_BLACKLIST: ""
      LOG_LEVEL: info
      JWT_SECRET: c42c8a9ac2f2d1d67860467eb18dd40d71de9487ae35ae8a632e14fe59f30c6f
      MANAGER_IP: 10.21.21.4
      MANAGER_PORT: 3006
      UMBREL_AUTH_SECRET: DEADBEEF
      AUTH_SERVICE_PORT: 2000
    volumes:
      - ${APP_DATA_DIR}:/data
      - ./umbrel-app.yml:/extra/umbrel-app.yml:ro

  dgb-digibyte:
    build:
      context: ./docker/digibyte
      args:
        DIGIBYTE_VERSION: ${DIGIBYTE_VERSION:-8.26.2}
    restart: unless-stopped
    stop_grace_period: 2m
    environment:
      RPC_USER: ${RPC_USER:-umbrel}
      RPC_PASSWORD: ${RPC_PASSWORD:-changeme}
    command:
      - digibyted
      - -datadir=/data
      - -printtoconsole
      - -server=1
      - -listen=1
      - -port=12024
      - -rpcbind=0.0.0.0
      - -rpcallowip=172.16.0.0/12
      - -rpcallowip=192.168.0.0/16
      - -rpcport=14022
      - -rpcuser=${RPC_USER:-umbrel}
      - -rpcpassword=${RPC_PASSWORD:-changeme}
      - -dbcache=${DGB_DBCACHE_MB:-6144}
      - -par=${DGB_PAR:-3}
      - -rpcthreads=${DGB_RPC_THREADS:-8}
      - -rpcworkqueue=${DGB_RPC_WORKQUEUE:-128}
      - -maxconnections=${DGB_MAX_CONNECTIONS:-160}
      - -maxmempool=${DGB_MAX_MEMPOOL_MB:-768}
      - -dnsseed=1
      - -fixedseeds=1
      - -seednode=seed.digibyte.org
      - -seednode=seed.digibyteservers.io
      - -seednode=seed.digibyte.io
      - -seednode=seed.digibyteblockchain.com
      - -seednode=dnsseed.esotericizm.site
      - -seednode=seed.digibytefoundation.org
      - -seednode=seed.digibyte.host
      - -txindex=0
    ports:
      - "${DGB_P2P_PORT:-12024}:12024/tcp"
    volumes:
      - ${APP_DATA_DIR}/data/digibyte:/data
    networks:
      - mining
    healthcheck:
      test: ["CMD-SHELL", "digibyte-cli -datadir=/data -rpcconnect=127.0.0.1 -rpcuser=\"$${RPC_USER}\" -rpcpassword=\"$${RPC_PASSWORD}\" getblockchaininfo >/dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 30
      start_period: 2m
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  dgb-ckpool:
    build:
      context: ./docker/ckpool
    restart: unless-stopped
    depends_on:
      dgb-digibyte:
        condition: service_healthy
    environment:
      RPC_USER: ${RPC_USER:-umbrel}
      RPC_PASSWORD: ${RPC_PASSWORD:-changeme}
      DGB_MINING_ADDRESS: ${DGB_MINING_ADDRESS}
      POOL_SIGNATURE: ${POOL_SIGNATURE:-DGB-SHA256-SOLO}
      STRATUM_INTERNAL_PORT: "3333"
      START_DIFF: ${START_DIFF:-10000}
      MIN_DIFF: ${MIN_DIFF:-1024}
    entrypoint: ["/bin/sh", "-ec"]
    command:
      - |
        mkdir -p /run/ckpool /logs
        while :; do
          if [ -f /app/.env ]; then
            . /app/.env
          fi
          if [ -n "$${DGB_MINING_ADDRESS:-}" ] && [ "$${DGB_MINING_ADDRESS}" != "CHANGE_ME_DGB_ADDRESS" ]; then
            break
          fi
          echo "Waiting for DGB_MINING_ADDRESS in .env before starting ckpool..." >&2
          sleep 10
        done
        sed \
          -e "s|@@RPC_USER@@|$${RPC_USER}|g" \
          -e "s|@@RPC_PASSWORD@@|$${RPC_PASSWORD}|g" \
          -e "s|@@DGB_MINING_ADDRESS@@|$${DGB_MINING_ADDRESS}|g" \
          -e "s|@@POOL_SIGNATURE@@|$${POOL_SIGNATURE}|g" \
          -e "s|@@STRATUM_INTERNAL_PORT@@|$${STRATUM_INTERNAL_PORT}|g" \
          -e "s|@@START_DIFF@@|$${START_DIFF}|g" \
          -e "s|@@MIN_DIFF@@|$${MIN_DIFF}|g" \
          /config/ckpool.conf.template > /run/ckpool/ckpool.conf
        rm -f /tmp/ckpool/*.pid /run/ckpool/*.pid 2>/dev/null || true
        exec ckpool -k -B -L -c /run/ckpool/ckpool.conf
    ports:
      - "${STRATUM_PORT:-3355}:3333/tcp"
    volumes:
      - ${APP_DATA_DIR}/pool:/config:ro
      - ${APP_DATA_DIR}/:/app:ro
      - ${APP_DATA_DIR}/data/ckpool:/logs
    networks:
      - mining
    ulimits:
      nofile:
        soft: 1048576
        hard: 1048576
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  dgb-dashboard:
    image: python:3.12-alpine
    restart: unless-stopped
    depends_on:
      dgb-digibyte:
        condition: service_healthy
    working_dir: /app
    command: ["python", "/app/dashboard/dashboard.py"]
    environment:
      RPC_URL: http://dgb-digibyte:14022/
      RPC_USER: ${RPC_USER:-umbrel}
      RPC_PASSWORD: ${RPC_PASSWORD:-changeme}
      STRATUM_PORT: ${STRATUM_PORT:-3355}
      DASHBOARD_TITLE: ${DASHBOARD_TITLE:-DGB SHA256 Solo Pool}
      EXPECTED_HASHRATE_TH: ${EXPECTED_HASHRATE_TH:-97}
      DASHBOARD_USER: ${DASHBOARD_USER:-admin}
      DASHBOARD_PASSWORD: ${DASHBOARD_PASSWORD:-admin}
      DGB_MINING_ADDRESS: ${DGB_MINING_ADDRESS}
    ports:
      - "${DASHBOARD_PORT:-8095}:8080/tcp"
    volumes:
      - ${APP_DATA_DIR}/:/app
      - ${APP_DATA_DIR}/data/ckpool:/logs:ro
    networks:
      - mining
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

networks:
  mining:
    name: dgbsha-net
    driver: bridge
