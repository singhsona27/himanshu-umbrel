services:
  app_proxy:
    environment:
      APP_HOST: karashare-web
      APP_PORT: 80
      PROXY_AUTH_ADD: "false"

  karashare-web:
    image: php:8.3-apache
    restart: unless-stopped
    volumes:
      - ${APP_DATA_DIR}:/var/www/html
    command: ["/bin/sh", "-ec", "a2enmod rewrite headers >/dev/null 2>&1 || true; apache2-foreground"]
